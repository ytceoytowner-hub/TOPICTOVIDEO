# GitHub Actions Workflow for Video Rendering
# =============================================
# Place this file at: .github/workflows/render.yml in your rendering repo
#
# Required GitHub Repository Secrets:
#   SUPABASE_URL        - Your project backend URL
#   SUPABASE_ANON_KEY   - Public anon key
#   SUPABASE_SERVICE_KEY - Service role key (sb_secret_... or eyJ...)
#
# Triggered by: Repository Dispatch from the dashboard

name: Render Video

on:
  repository_dispatch:
    types: [render-video]
  workflow_dispatch:
    inputs:
      pending_render_id:
        description: 'Pending render ID from Supabase'
        required: true
      callback_action:
        description: 'Callback action name'
        required: false
        default: 'kaggle-callback'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Get render parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "render_id=${{ github.event.client_payload.pending_render_id }}" >> $GITHUB_OUTPUT
            echo "callback=${{ github.event.client_payload.callback_action || 'kaggle-callback' }}" >> $GITHUB_OUTPUT
          else
            echo "render_id=${{ github.event.inputs.pending_render_id }}" >> $GITHUB_OUTPUT
            echo "callback=${{ github.event.inputs.callback_action || 'kaggle-callback' }}" >> $GITHUB_OUTPUT
          fi

      - name: Update status to rendering
        run: |
          SERVICE_KEY="${SUPABASE_SERVICE_KEY}"
          if [[ "$SERVICE_KEY" == sb_secret_* ]]; then
            HEADER="apikey: $SERVICE_KEY"
          else
            HEADER="Authorization: Bearer $SERVICE_KEY"
          fi
          curl -s -X PATCH \
            "$SUPABASE_URL/rest/v1/pending_renders?id=eq.${{ steps.params.outputs.render_id }}" \
            -H "$HEADER" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status":"rendering"}'

      - name: Fetch render job details
        id: job
        run: |
          SERVICE_KEY="${SUPABASE_SERVICE_KEY}"
          if [[ "$SERVICE_KEY" == sb_secret_* ]]; then
            AUTH_HEADER="apikey: $SERVICE_KEY"
          else
            AUTH_HEADER="Authorization: Bearer $SERVICE_KEY"
          fi
          RENDER_DATA=$(curl -s \
            "$SUPABASE_URL/rest/v1/pending_renders?id=eq.${{ steps.params.outputs.render_id }}&select=*" \
            -H "$AUTH_HEADER" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json")
          echo "data=$RENDER_DATA" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install gtts

      - name: Download assets and render video
        id: render
        run: |
          mkdir -p /tmp/render_work
          cd /tmp/render_work

          RENDER_DATA='${{ steps.job.outputs.data }}'
          
          # Parse video params
          RESOLUTION=$(echo "$RENDER_DATA" | jq -r '.[0].video_params.resolution // "1920x1080"')
          FPS=$(echo "$RENDER_DATA" | jq -r '.[0].video_params.fps // 30')
          DURATION=$(echo "$RENDER_DATA" | jq -r '.[0].video_params.duration // 60')
          CAPTIONS=$(echo "$RENDER_DATA" | jq -r '.[0].video_params.captions // false')
          BG_MUSIC=$(echo "$RENDER_DATA" | jq -r '.[0].video_params.bg_music // "none"')
          SCRIPT_CONTENT=$(echo "$RENDER_DATA" | jq -r '.[0].video_params.script_content // ""')
          WIDTH=$(echo "$RESOLUTION" | cut -d'x' -f1)
          HEIGHT=$(echo "$RESOLUTION" | cut -d'x' -f2)

          # Generate voiceover with gTTS if script content available
          if [ -n "$SCRIPT_CONTENT" ] && [ "$SCRIPT_CONTENT" != "null" ]; then
            # Detect language from content (simple heuristic: check for Devanagari)
            if echo "$SCRIPT_CONTENT" | grep -qP '[\x{0900}-\x{097F}]'; then
              LANG_CODE="hi"
            else
              LANG_CODE="en"
            fi
            python3 -c "
from gtts import gTTS
import sys
text = '''$SCRIPT_CONTENT'''
tts = gTTS(text=text, lang='$LANG_CODE', slow=False)
tts.save('voiceover_gtts.mp3')
print('gTTS voiceover generated successfully')
"
            # If gTTS generated successfully, use it
            if [ -f voiceover_gtts.mp3 ]; then
              echo "Using gTTS voiceover"
              cp voiceover_gtts.mp3 voiceover.mp3
            fi
          fi

          # Download assets
          ASSET_COUNT=$(echo "$RENDER_DATA" | jq '.[0].asset_urls | length // 0')
          for i in $(seq 0 $(($ASSET_COUNT - 1))); do
            URL=$(echo "$RENDER_DATA" | jq -r ".[0].asset_urls[$i].url // .[0].asset_urls[$i]")
            TYPE=$(echo "$RENDER_DATA" | jq -r ".[0].asset_urls[$i].type // \"video\"")
            if [ "$URL" != "null" ] && [ -n "$URL" ]; then
              if [ "$TYPE" = "voiceover" ]; then
                # Only download if gTTS didn't generate one
                if [ ! -f voiceover.mp3 ]; then
                  curl -sL "$URL" -o voiceover.mp3
                fi
              else
                curl -sL "$URL" -o "input_$(printf '%03d' $i).mp4"
              fi
            fi
          done

          # Download background music from YouTube Audio Library (royalty-free)
          if [ "$BG_MUSIC" != "none" ] && [ "$BG_MUSIC" != "null" ]; then
            echo "Background music genre requested: $BG_MUSIC"
            # Generate a tone-based ambient track using ffmpeg (royalty-free)
            case "$BG_MUSIC" in
              phonk)
                ffmpeg -y -f lavfi -i "anoisesrc=d=${DURATION}:c=brown:r=44100:a=0.03" \
                  -af "bass=g=10,treble=g=-5,lowpass=f=2000" \
                  -t "$DURATION" -c:a libmp3lame -b:a 128k bg_music.mp3 2>/dev/null
                ;;
              lofi)
                ffmpeg -y -f lavfi -i "anoisesrc=d=${DURATION}:c=pink:r=44100:a=0.02" \
                  -af "lowpass=f=3000,bass=g=5" \
                  -t "$DURATION" -c:a libmp3lame -b:a 128k bg_music.mp3 2>/dev/null
                ;;
              cinematic)
                ffmpeg -y -f lavfi -i "sine=f=220:d=${DURATION}" \
                  -f lavfi -i "sine=f=330:d=${DURATION}" \
                  -filter_complex "[0:a][1:a]amix=inputs=2:duration=longest,volume=0.05,aecho=0.8:0.88:60:0.4" \
                  -t "$DURATION" -c:a libmp3lame -b:a 128k bg_music.mp3 2>/dev/null
                ;;
              upbeat)
                ffmpeg -y -f lavfi -i "anoisesrc=d=${DURATION}:c=white:r=44100:a=0.015" \
                  -af "highpass=f=500,tremolo=f=8:d=0.5" \
                  -t "$DURATION" -c:a libmp3lame -b:a 128k bg_music.mp3 2>/dev/null
                ;;
              dark)
                ffmpeg -y -f lavfi -i "anoisesrc=d=${DURATION}:c=brown:r=44100:a=0.02" \
                  -af "lowpass=f=800,aecho=0.8:0.9:1000:0.3" \
                  -t "$DURATION" -c:a libmp3lame -b:a 128k bg_music.mp3 2>/dev/null
                ;;
            esac
            echo "Background music generated: $(ls -la bg_music.mp3 2>/dev/null || echo 'failed')"
          fi

          # Build FFmpeg command
          INPUT_FILES=$(ls input_* 2>/dev/null | wc -l)
          HAS_VOICEOVER=$([ -f voiceover.mp3 ] && echo "yes" || echo "no")
          HAS_BG_MUSIC=$([ -f bg_music.mp3 ] && echo "yes" || echo "no")

          if [ "$INPUT_FILES" -eq 0 ] && [ "$HAS_VOICEOVER" = "no" ]; then
            # Generate placeholder
            ffmpeg -y -f lavfi -i "color=c=black:s=${WIDTH}x${HEIGHT}:d=${DURATION}:r=${FPS}" \
              -f lavfi -i "anullsrc=r=44100:cl=stereo" \
              -t "$DURATION" -c:v libx264 -preset ultrafast -crf 23 \
              -c:a aac -b:a 192k -movflags +faststart output.mp4
          else
            FFMPEG_CMD="ffmpeg -y"
            FILTER_COMPLEX=""
            AUDIO_INPUTS=0
            
            if [ "$INPUT_FILES" -gt 0 ]; then
              ls input_* | while read f; do echo "file '$f'"; done > concat.txt
              FFMPEG_CMD="$FFMPEG_CMD -f concat -safe 0 -i concat.txt"
            fi
            
            if [ "$HAS_VOICEOVER" = "yes" ]; then
              FFMPEG_CMD="$FFMPEG_CMD -i voiceover.mp3"
              AUDIO_INPUTS=$((AUDIO_INPUTS + 1))
            fi
            
            if [ "$HAS_BG_MUSIC" = "yes" ]; then
              FFMPEG_CMD="$FFMPEG_CMD -i bg_music.mp3"
              AUDIO_INPUTS=$((AUDIO_INPUTS + 1))
            fi

            # Mix audio: voiceover at full volume, bg music at 15%
            if [ "$HAS_VOICEOVER" = "yes" ] && [ "$HAS_BG_MUSIC" = "yes" ]; then
              VO_IDX=1
              BG_IDX=2
              [ "$INPUT_FILES" -eq 0 ] && VO_IDX=0 && BG_IDX=1
              FFMPEG_CMD="$FFMPEG_CMD -filter_complex [${VO_IDX}:a]volume=1.0[vo];[${BG_IDX}:a]volume=0.15[bg];[vo][bg]amix=inputs=2:duration=longest[aout] -map 0:v -map [aout]"
            fi

            $FFMPEG_CMD -c:v libx264 -preset ultrafast -crf 23 \
              -c:a aac -b:a 192k -s "${WIDTH}x${HEIGHT}" -r "$FPS" \
              -movflags +faststart -t "$DURATION" output_raw.mp4
            
            # Rename for caption step
            mv output_raw.mp4 output.mp4
          fi

          # Generate captions if enabled
          if [ "$CAPTIONS" = "true" ] && [ -n "$SCRIPT_CONTENT" ] && [ "$SCRIPT_CONTENT" != "null" ]; then
            echo "Generating captions..."
            
            # Create SRT from script content
            python3 << 'CAPTION_SCRIPT'
import subprocess, json, math

script_text = """SCRIPT_CONTENT_PLACEHOLDER"""
# Split into sentences
import re
sentences = re.split(r'(?<=[.!?])\s+', script_text.strip())
sentences = [s for s in sentences if s.strip()]

# Get audio duration
try:
    result = subprocess.run(['ffprobe', '-v', 'quiet', '-show_entries', 'format=duration', '-of', 'json', 'voiceover.mp3'], capture_output=True, text=True)
    duration = float(json.loads(result.stdout)['format']['duration'])
except:
    duration = 60.0

time_per_sentence = duration / max(len(sentences), 1)
srt_lines = []
for i, sent in enumerate(sentences):
    start = i * time_per_sentence
    end = min((i + 1) * time_per_sentence, duration)
    sh, sm, ss = int(start//3600), int((start%3600)//60), start%60
    eh, em, es = int(end//3600), int((end%3600)//60), end%60
    srt_lines.append(f"{i+1}")
    srt_lines.append(f"{sh:02d}:{sm:02d}:{ss:06.3f} --> {eh:02d}:{em:02d}:{es:06.3f}".replace('.', ','))
    srt_lines.append(sent.strip())
    srt_lines.append("")

with open('captions.srt', 'w', encoding='utf-8') as f:
    f.write('\n'.join(srt_lines))
print(f"Generated {len(sentences)} caption entries")
CAPTION_SCRIPT

            # Replace placeholder with actual script content
            ESCAPED_SCRIPT=$(echo "$SCRIPT_CONTENT" | head -c 50000 | sed 's/"""/\\"\\"\\"/g')
            sed -i "s|SCRIPT_CONTENT_PLACEHOLDER|${ESCAPED_SCRIPT}|g" /dev/null 2>/dev/null || true

            # Simpler approach: write script to file and use Python
            echo "$SCRIPT_CONTENT" > /tmp/script_text.txt
            python3 << 'CAPTION_PY'
import re, json, subprocess

with open('/tmp/script_text.txt', 'r') as f:
    script_text = f.read()

sentences = re.split(r'(?<=[.!?])\s+', script_text.strip())
sentences = [s for s in sentences if s.strip()]

try:
    result = subprocess.run(['ffprobe', '-v', 'quiet', '-show_entries', 'format=duration', '-of', 'json', 'voiceover.mp3'], capture_output=True, text=True)
    duration = float(json.loads(result.stdout)['format']['duration'])
except:
    duration = 60.0

time_per = duration / max(len(sentences), 1)
srt = []
for i, sent in enumerate(sentences):
    start = i * time_per
    end = min((i + 1) * time_per, duration)
    def fmt(t):
        h, rem = divmod(t, 3600)
        m, s = divmod(rem, 60)
        return f"{int(h):02d}:{int(m):02d}:{s:06.3f}".replace('.', ',')
    srt.append(f"{i+1}\n{fmt(start)} --> {fmt(end)}\n{sent.strip()}\n")

with open('captions.srt', 'w', encoding='utf-8') as f:
    f.write('\n'.join(srt))
print(f"Generated {len(sentences)} captions")
CAPTION_PY

            if [ -f captions.srt ]; then
              echo "Burning captions into video..."
              ffmpeg -y -i output.mp4 \
                -vf "subtitles=captions.srt:force_style='FontName=Arial,FontSize=22,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,Outline=2,Shadow=1,MarginV=30'" \
                -c:v libx264 -preset ultrafast -crf 23 \
                -c:a copy -movflags +faststart output_captioned.mp4
              
              if [ -f output_captioned.mp4 ]; then
                mv output_captioned.mp4 output.mp4
                echo "Captions burned successfully"
              fi
            fi
          fi

          echo "output_path=/tmp/render_work/output.mp4" >> $GITHUB_OUTPUT

      - name: Upload to Supabase Storage
        id: upload
        run: |
          RENDER_ID="${{ steps.params.outputs.render_id }}"
          FILE_NAME="renders/github-${RENDER_ID}.mp4"
          SERVICE_KEY="${SUPABASE_SERVICE_KEY}"
          if [[ "$SERVICE_KEY" == sb_secret_* ]]; then
            AUTH_HEADER="apikey: $SERVICE_KEY"
          else
            AUTH_HEADER="Authorization: Bearer $SERVICE_KEY"
          fi

          UPLOAD_RESULT=$(curl -s -w "%{http_code}" -o /tmp/upload_response.txt \
            -X POST "$SUPABASE_URL/storage/v1/object/renders/$FILE_NAME" \
            -H "$AUTH_HEADER" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: video/mp4" \
            -H "x-upsert: true" \
            --data-binary @/tmp/render_work/output.mp4)

          if [ "$UPLOAD_RESULT" -eq 200 ] || [ "$UPLOAD_RESULT" -eq 201 ]; then
            VIDEO_URL="$SUPABASE_URL/storage/v1/object/public/renders/$FILE_NAME"
            echo "video_url=$VIDEO_URL" >> $GITHUB_OUTPUT
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "Upload failed with status $UPLOAD_RESULT"
            cat /tmp/upload_response.txt
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Send callback
        if: always()
        run: |
          RENDER_ID="${{ steps.params.outputs.render_id }}"
          CALLBACK="${{ steps.params.outputs.callback }}"
          VIDEO_URL="${{ steps.upload.outputs.video_url }}"
          SUCCESS="${{ steps.upload.outputs.success }}"

          if [ "$SUCCESS" = "true" ] && [ -n "$VIDEO_URL" ]; then
            BODY="{\"action\":\"$CALLBACK\",\"pending_render_id\":\"$RENDER_ID\",\"video_url\":\"$VIDEO_URL\"}"
          else
            BODY="{\"action\":\"$CALLBACK\",\"pending_render_id\":\"$RENDER_ID\",\"error\":\"GitHub Actions render failed\"}"
          fi

          curl -s -X POST "$SUPABASE_URL/functions/v1/kaggle-render" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY"
