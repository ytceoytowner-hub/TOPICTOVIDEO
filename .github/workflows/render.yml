name: Render Video

permissions:
  contents: write
  actions: write
  statuses: write

on:
  repository_dispatch:
    types: [render-video]
  workflow_dispatch:
    inputs:
      pending_render_id:
        description: 'Pending render ID'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # These MUST match your GitHub Secrets names exactly
      S_URL: ${{ secrets.SUPABASE_URL }}
      S_ANON: ${{ secrets.SUPABASE_ANON_KEY }}
      S_SERV: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Debug Connection
        run: |
          echo "Checking Supabase Connection..."
          if [ -z "$S_URL" ]; then echo "ERROR: SUPABASE_URL is empty"; exit 1; fi
          # Test if the URL is reachable
          curl -I -s "${S_URL}/rest/v1/" -H "apikey: ${S_ANON}" || echo "Connection test failed but continuing..."

      - name: Fetch Data
        id: fetch
        run: |
          RENDER_ID="${{ github.event.client_payload.pending_render_id || github.event.inputs.pending_render_id }}"
          echo "render_id=$RENDER_ID" >> $GITHUB_OUTPUT
          
          # Fetching data into a file
          curl -f -s -X GET \
            "${S_URL}/rest/v1/pending_renders?id=eq.${RENDER_ID}&select=*" \
            -H "apikey: ${S_ANON}" \
            -H "Authorization: Bearer ${S_SERV}" \
            -o data.json
          
          if [ ! -s data.json ]; then echo "No data found for ID $RENDER_ID"; exit 1; fi

      - name: Install Tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y ffmpeg jq
          pip install gtts

      - name: Process and Render
        run: |
          # Extract variables
          SCRIPT=$(jq -r '.[0].video_params.script_content // ""' data.json)
          RES=$(jq -r '.[0].video_params.resolution // "1280x720"' data.json)
          DUR=$(jq -r '.[0].video_params.duration // 10' data.json)
          WIDTH=$(echo $RES | cut -d'x' -f1)
          HEIGHT=$(echo $RES | cut -d'x' -f2)

          # 1. Voiceover
          if [ -n "$SCRIPT" ]; then
            python3 -c "from gtts import gTTS; gTTS(text='''$SCRIPT''', lang='hi' if any('\u0900' <= c <= '\u097F' for c in '''$SCRIPT''') else 'en').save('vo.mp3')"
          fi

          # 2. Download first video asset found
          URL=$(jq -r '.[0].asset_urls[0].url // .[0].asset_urls[0]' data.json)
          if [[ "$URL" == http* ]]; then
            curl -L "$URL" -o input.mp4
          fi

          # 3. Final Render (Handles missing video by using black screen)
          if [ -f input.mp4 ]; then
            ffmpeg -y -i input.mp4 -i vo.mp3 -map 0:v -map 1:a -c:v libx264 -t "$DUR" -pix_fmt yuv420p -vf "scale=$WIDTH:$HEIGHT" output.mp4
          else
            ffmpeg -y -f lavfi -i color=c=black:s=${WIDTH}x${HEIGHT}:d=${DUR} -i vo.mp3 -map 0:v -map 1:a -c:v libx264 -pix_fmt yuv420p output.mp4
          fi

      - name: Upload
        id: upload
        run: |
          F_NAME="renders/${{ steps.fetch.outputs.render_id }}.mp4"
          curl -f -s -X POST "${S_URL}/storage/v1/object/renders/${F_NAME}" \
            -H "apikey: ${S_ANON}" \
            -H "Authorization: Bearer ${S_SERV}" \
            -H "Content-Type: video/mp4" \
            -H "x-upsert: true" \
            --data-binary @output.mp4
          
          echo "url=${S_URL}/storage/v1/object/public/renders/${F_NAME}" >> $GITHUB_OUTPUT

      - name: Callback
        if: always()
        run: |
          curl -s -X POST "${S_URL}/functions/v1/kaggle-render" \
            -H "apikey: ${S_ANON}" \
            -H "Content-Type: application/json" \
            -d "{\"pending_render_id\":\"${{ steps.fetch.outputs.render_id }}\", \"video_url\":\"${{ steps.upload.outputs.url }}\"}"
