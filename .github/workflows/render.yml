name: Render Video

on:
  repository_dispatch:
    types: [render-video]
  workflow_dispatch:
    inputs:
      pending_render_id:
        description: 'Pending render ID'
        required: true
      callback_action:
        description: 'Callback action name'
        required: false
        default: 'kaggle-callback'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Get render parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "render_id=${{ github.event.client_payload.pending_render_id }}" >> $GITHUB_OUTPUT
            echo "callback=${{ github.event.client_payload.callback_action || 'kaggle-callback' }}" >> $GITHUB_OUTPUT
          else
            echo "render_id=${{ github.event.inputs.pending_render_id }}" >> $GITHUB_OUTPUT
            echo "callback=${{ github.event.inputs.callback_action || 'kaggle-callback' }}" >> $GITHUB_OUTPUT
          fi

      - name: Update status to rendering
        run: |
          SERVICE_KEY="${SUPABASE_SERVICE_KEY}"
          if [[ "$SERVICE_KEY" == sb_secret_* ]]; then
            AUTH="apikey: $SERVICE_KEY"
          else
            AUTH="Authorization: Bearer $SERVICE_KEY"
          fi
          curl -s -X PATCH \
            "$SUPABASE_URL/rest/v1/pending_renders?id=eq.${{ steps.params.outputs.render_id }}" \
            -H "$AUTH" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status":"rendering"}'

      - name: Fetch render job details
        id: job
        run: |
          SERVICE_KEY="${SUPABASE_SERVICE_KEY}"
          if [[ "$SERVICE_KEY" == sb_secret_* ]]; then
            AUTH="apikey: $SERVICE_KEY"
          else
            AUTH="Authorization: Bearer $SERVICE_KEY"
          fi
          curl -s \
            "$SUPABASE_URL/rest/v1/pending_renders?id=eq.${{ steps.params.outputs.render_id }}&select=*" \
            -H "$AUTH" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -o /tmp/render_data.json
          cat /tmp/render_data.json | head -c 500
          echo ""

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg jq
          python3 -m pip install --break-system-packages edge-tts

      - name: Create helper scripts
        run: |
          mkdir -p /tmp/render_work

          cat > /tmp/tts.py << 'EOF'
          import asyncio, edge_tts, re, sys

          text = open('/tmp/script_text.txt', 'r', encoding='utf-8').read().strip()
          if not text or len(text) < 5:
              print("No script text, skipping TTS")
              sys.exit(0)

          has_hindi = bool(re.search(r'[\u0900-\u097F]', text))
          voice = "hi-IN-SwaraNeural" if has_hindi else "en-US-AndrewMultilingualNeural"
          print(f"Voice: {voice}, Length: {len(text)} chars")

          async def run():
              c = edge_tts.Communicate(text[:5000], voice)
              await c.save("/tmp/render_work/voiceover.mp3")
              print("Voiceover saved")

          asyncio.run(run())
          EOF

          cat > /tmp/captions.py << 'EOF'
          import re, json, subprocess

          text = open('/tmp/script_text.txt', 'r', encoding='utf-8').read().strip()
          if not text:
              exit(0)

          sentences = [s.strip() for s in re.split(r'(?<=[.!?\u0964])\s+', text) if s.strip()]

          try:
              r = subprocess.run(['ffprobe','-v','quiet','-show_entries','format=duration','-of','json','/tmp/render_work/voiceover.mp3'], capture_output=True, text=True)
              dur = float(json.loads(r.stdout)['format']['duration'])
          except Exception:
              dur = 60.0

          tp = dur / max(len(sentences), 1)
          lines = []
          for i, s in enumerate(sentences):
              st = i * tp
              en = min((i+1)*tp, dur)
              def f(t):
                  h,rem=divmod(t,3600); m,sec=divmod(rem,60)
                  return f"{int(h):02d}:{int(m):02d}:{sec:06.3f}".replace('.',',')
              lines.append(f"{i+1}\n{f(st)} --> {f(en)}\n{s}\n")

          open('/tmp/render_work/captions.srt','w',encoding='utf-8').write('\n'.join(lines))
          print(f"Generated {len(sentences)} captions")
          EOF

      - name: Download assets and render video
        id: render
        run: |
          set -e
          cd /tmp/render_work
          RENDER_DATA=$(cat /tmp/render_data.json)

          RESOLUTION=$(echo "$RENDER_DATA" | jq -r '.[0].video_params.resolution // "1920x1080"')
          FPS=$(echo "$RENDER_DATA" | jq -r '.[0].video_params.fps // "30"')
          DURATION=$(echo "$RENDER_DATA" | jq -r '.[0].video_params.duration // "60"')
          CAPTIONS=$(echo "$RENDER_DATA" | jq -r '.[0].video_params.captions // "false"')
          BG_MUSIC=$(echo "$RENDER_DATA" | jq -r '.[0].video_params.bg_music // "none"')
          WIDTH=$(echo "$RESOLUTION" | cut -d'x' -f1)
          HEIGHT=$(echo "$RESOLUTION" | cut -d'x' -f2)

          # Extract script content safely
          echo "$RENDER_DATA" | jq -r '.[0].video_params.script_content // ""' > /tmp/script_text.txt
          SCRIPT_LEN=$(wc -c < /tmp/script_text.txt | tr -d ' ')
          echo "Script: $SCRIPT_LEN bytes, Res: ${WIDTH}x${HEIGHT}, FPS: $FPS, Duration: $DURATION"

          # Generate voiceover
          if [ "$SCRIPT_LEN" -gt 5 ]; then
            python3 /tmp/tts.py || echo "WARN: TTS failed, continuing without voiceover"
          fi

          # Download assets
          ASSET_COUNT=$(echo "$RENDER_DATA" | jq -r '.[0].asset_urls | if . == null then 0 else length end')
          echo "Assets to download: $ASSET_COUNT"
          if [ "$ASSET_COUNT" -gt 0 ]; then
            for i in $(seq 0 $(($ASSET_COUNT - 1))); do
              URL=$(echo "$RENDER_DATA" | jq -r ".[0].asset_urls[$i].url // .[0].asset_urls[$i] // empty")
              TYPE=$(echo "$RENDER_DATA" | jq -r ".[0].asset_urls[$i].type // \"video\"")
              if [ -n "$URL" ] && [ "$URL" != "null" ]; then
                if [ "$TYPE" = "voiceover" ] && [ ! -f voiceover.mp3 ]; then
                  curl -sL "$URL" -o voiceover.mp3 && echo "Downloaded voiceover"
                elif [ "$TYPE" != "voiceover" ]; then
                  curl -sL "$URL" -o "input_$(printf '%03d' $i).mp4" && echo "Downloaded asset $i"
                fi
              fi
            done
          fi

          # Generate background music with ffmpeg
          if [ "$BG_MUSIC" != "none" ] && [ "$BG_MUSIC" != "null" ] && [ -n "$BG_MUSIC" ]; then
            echo "Generating $BG_MUSIC background music..."
            case "$BG_MUSIC" in
              phonk)
                ffmpeg -y -f lavfi -i "anoisesrc=d=${DURATION}:c=brown:r=44100:a=0.03" \
                  -af "bass=g=10,treble=g=-5,lowpass=f=2000" \
                  -t "$DURATION" -c:a libmp3lame -b:a 128k bg_music.mp3 2>/dev/null ;;
              lofi)
                ffmpeg -y -f lavfi -i "anoisesrc=d=${DURATION}:c=pink:r=44100:a=0.02" \
                  -af "lowpass=f=3000,bass=g=5" \
                  -t "$DURATION" -c:a libmp3lame -b:a 128k bg_music.mp3 2>/dev/null ;;
              cinematic)
                ffmpeg -y -f lavfi -i "sine=f=220:d=${DURATION}" \
                  -f lavfi -i "sine=f=330:d=${DURATION}" \
                  -filter_complex "[0:a][1:a]amix=inputs=2:duration=longest,volume=0.05,aecho=0.8:0.88:60:0.4" \
                  -t "$DURATION" -c:a libmp3lame -b:a 128k bg_music.mp3 2>/dev/null ;;
              upbeat)
                ffmpeg -y -f lavfi -i "anoisesrc=d=${DURATION}:c=white:r=44100:a=0.015" \
                  -af "highpass=f=500,tremolo=f=8:d=0.5" \
                  -t "$DURATION" -c:a libmp3lame -b:a 128k bg_music.mp3 2>/dev/null ;;
              dark)
                ffmpeg -y -f lavfi -i "anoisesrc=d=${DURATION}:c=brown:r=44100:a=0.02" \
                  -af "lowpass=f=800,aecho=0.8:0.9:1000:0.3" \
                  -t "$DURATION" -c:a libmp3lame -b:a 128k bg_music.mp3 2>/dev/null ;;
            esac
            [ -f bg_music.mp3 ] && echo "Background music generated" || echo "WARN: BG music generation failed"
          fi

          # Count inputs
          INPUT_FILES=$(ls input_* 2>/dev/null | wc -l)
          HAS_VO=$( [ -f voiceover.mp3 ] && echo 1 || echo 0 )
          HAS_BG=$( [ -f bg_music.mp3 ] && echo 1 || echo 0 )
          echo "Building video: $INPUT_FILES inputs, voiceover=$HAS_VO, bg_music=$HAS_BG"

          # No inputs at all - generate blank video
          if [ "$INPUT_FILES" -eq 0 ] && [ "$HAS_VO" -eq 0 ]; then
            ffmpeg -y \
              -f lavfi -i "color=c=black:s=${WIDTH}x${HEIGHT}:d=${DURATION}:r=${FPS}" \
              -f lavfi -i "anullsrc=r=44100:cl=stereo" \
              -t "$DURATION" -c:v libx264 -preset ultrafast -crf 23 \
              -c:a aac -b:a 192k -shortest -movflags +faststart output.mp4
            echo "Generated blank video"
          else
            # Build input arguments
            FFARGS=""
            NEXT_IDX=0

            if [ "$INPUT_FILES" -gt 0 ]; then
              ls input_* | sort | while read f; do echo "file '$f'"; done > concat.txt
              FFARGS="$FFARGS -f concat -safe 0 -i concat.txt"
              VIDX=$NEXT_IDX
              NEXT_IDX=$((NEXT_IDX + 1))
            else
              VIDX=-1
            fi

            if [ "$HAS_VO" -eq 1 ]; then
              FFARGS="$FFARGS -i voiceover.mp3"
              VO_IDX=$NEXT_IDX
              NEXT_IDX=$((NEXT_IDX + 1))
            else
              VO_IDX=-1
            fi

            if [ "$HAS_BG" -eq 1 ]; then
              FFARGS="$FFARGS -i bg_music.mp3"
              BG_IDX=$NEXT_IDX
              NEXT_IDX=$((NEXT_IDX + 1))
            else
              BG_IDX=-1
            fi

            # Build audio filter
            FILTER=""
            MAPS=""

            if [ "$VIDX" -ge 0 ]; then
              MAPS="-map 0:v"
            fi

            if [ "$VO_IDX" -ge 0 ] && [ "$BG_IDX" -ge 0 ]; then
              FILTER="-filter_complex [${VO_IDX}:a]volume=1.0[vo];[${BG_IDX}:a]volume=0.15[bg];[vo][bg]amix=inputs=2:duration=longest[aout]"
              MAPS="$MAPS -map [aout]"
            elif [ "$VO_IDX" -ge 0 ]; then
              MAPS="$MAPS -map ${VO_IDX}:a"
            elif [ "$BG_IDX" -ge 0 ]; then
              MAPS="$MAPS -map ${BG_IDX}:a"
            fi

            echo "FFmpeg args: $FFARGS $FILTER $MAPS"
            eval ffmpeg -y $FFARGS $FILTER $MAPS \
              -c:v libx264 -preset ultrafast -crf 23 \
              -c:a aac -b:a 192k -s "${WIDTH}x${HEIGHT}" -r "$FPS" \
              -movflags +faststart -t "$DURATION" output.mp4

            echo "Video rendered successfully"
          fi

          # Burn captions
          if [ "$CAPTIONS" = "true" ] && [ "$SCRIPT_LEN" -gt 5 ]; then
            echo "Burning captions..."
            python3 /tmp/captions.py || echo "WARN: Caption generation failed"
            if [ -f captions.srt ]; then
              ffmpeg -y -i output.mp4 \
                -vf "subtitles=captions.srt:force_style='FontName=Arial,FontSize=22,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,Outline=2,Shadow=1,MarginV=30'" \
                -c:v libx264 -preset ultrafast -crf 23 \
                -c:a copy -movflags +faststart output_captioned.mp4 && \
              mv output_captioned.mp4 output.mp4 && echo "Captions burned" || echo "WARN: Caption burn failed"
            fi
          fi

          ls -lh output.mp4
          echo "output_path=/tmp/render_work/output.mp4" >> $GITHUB_OUTPUT

      - name: Upload to storage
        id: upload
        run: |
          RENDER_ID="${{ steps.params.outputs.render_id }}"
          FILE_NAME="renders/github-${RENDER_ID}.mp4"
          SERVICE_KEY="${SUPABASE_SERVICE_KEY}"
          if [[ "$SERVICE_KEY" == sb_secret_* ]]; then
            AUTH="apikey: $SERVICE_KEY"
          else
            AUTH="Authorization: Bearer $SERVICE_KEY"
          fi

          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/upload_resp.txt \
            -X POST "$SUPABASE_URL/storage/v1/object/renders/$FILE_NAME" \
            -H "$AUTH" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: video/mp4" \
            -H "x-upsert: true" \
            --data-binary @/tmp/render_work/output.mp4)

          echo "Upload response: $HTTP_CODE"
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
            VIDEO_URL="$SUPABASE_URL/storage/v1/object/public/renders/$FILE_NAME"
            echo "video_url=$VIDEO_URL" >> $GITHUB_OUTPUT
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "Upload failed:"
            cat /tmp/upload_resp.txt
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Send callback
        if: always()
        run: |
          RENDER_ID="${{ steps.params.outputs.render_id }}"
          CALLBACK="${{ steps.params.outputs.callback }}"
          VIDEO_URL="${{ steps.upload.outputs.video_url }}"
          SUCCESS="${{ steps.upload.outputs.success }}"

          if [ "$SUCCESS" = "true" ] && [ -n "$VIDEO_URL" ]; then
            BODY="{\"action\":\"$CALLBACK\",\"pending_render_id\":\"$RENDER_ID\",\"video_url\":\"$VIDEO_URL\"}"
          else
            BODY="{\"action\":\"$CALLBACK\",\"pending_render_id\":\"$RENDER_ID\",\"error\":\"GitHub Actions render failed\"}"
          fi

          curl -s -X POST "$SUPABASE_URL/functions/v1/kaggle-render" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY"
