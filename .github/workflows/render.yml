name: Render Video

on:
  repository_dispatch:
    types: [render-video]
  workflow_dispatch:
    inputs:
      pending_render_id:
        description: "Pending render ID"
        required: true
      callback_action:
        description: "Callback action name"
        required: false
        default: "kaggle-callback"

permissions:
  contents: read

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Resolve parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "render_id=${{ github.event.client_payload.pending_render_id }}" >> "$GITHUB_OUTPUT"
            CB="${{ github.event.client_payload.callback_action }}"
          else
            echo "render_id=${{ github.event.inputs.pending_render_id }}" >> "$GITHUB_OUTPUT"
            CB="${{ github.event.inputs.callback_action }}"
          fi
          echo "callback=${CB:-kaggle-callback}" >> "$GITHUB_OUTPUT"

      - name: Validate
        run: |
          test -n "${{ steps.params.outputs.render_id }}" || { echo "Missing render_id"; exit 1; }
          test -n "$SUPABASE_URL" || { echo "Missing SUPABASE_URL"; exit 1; }
          test -n "$SUPABASE_SERVICE_KEY" || { echo "Missing SUPABASE_SERVICE_KEY"; exit 1; }

      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg jq
          python3 -m pip install --break-system-packages edge-tts

      - name: Mark rendering
        run: |
          RID="${{ steps.params.outputs.render_id }}"
          AUTH_H="Authorization: Bearer $SUPABASE_SERVICE_KEY"
          curl -sS -X PATCH "$SUPABASE_URL/rest/v1/pending_renders?id=eq.$RID" \
            -H "$AUTH_H" -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            -d '{"status":"rendering"}' >/dev/null

      - name: Fetch render data
        run: |
          RID="${{ steps.params.outputs.render_id }}"
          AUTH_H="Authorization: Bearer $SUPABASE_SERVICE_KEY"
          curl -sS "$SUPABASE_URL/rest/v1/pending_renders?id=eq.$RID&select=*" \
            -H "$AUTH_H" -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" -o /tmp/render_data.json
          test "$(jq 'length' /tmp/render_data.json)" -gt 0 || { echo "No render found"; exit 1; }

      - name: Write render script
        run: |
          cat > /tmp/render.py << 'PYEOF'
          import json, os, re, subprocess, asyncio
          from pathlib import Path
          from concurrent.futures import ThreadPoolExecutor
          import edge_tts

          def detect_kind(p):
              pr = subprocess.run(["ffprobe","-v","error","-show_entries","stream=codec_type","-of","json",str(p)], capture_output=True, text=True)
              try:
                  for s in json.loads(pr.stdout or "{}").get("streams",[]):
                      if s.get("codec_type")=="video": return "video"
              except: pass
              return "image" if p.suffix.lower() in {".jpg",".jpeg",".png",".webp",".bmp"} else "unknown"

          async def gen_voice(text, out):
              hindi = bool(re.search(r'[\u0900-\u097F]', text))
              v = "hi-IN-SwaraNeural" if hindi else "en-US-AndrewMultilingualNeural"
              c = edge_tts.Communicate(text=text[:5000], voice=v, rate="+10%", pitch="+2Hz")
              await c.save(str(out))

          def dl_one(args):
              i, url, dest = args
              subprocess.run(["curl","-fsSL","--retry","2","-o",str(dest),str(url)])
              return dest if dest.exists() and dest.stat().st_size > 0 else None

          def main():
              W = Path("/tmp/rw"); W.mkdir(parents=True, exist_ok=True); os.chdir(W)
              data = json.loads(Path("/tmp/render_data.json").read_text())[0]
              vp = data.get("video_params") or {}
              
              w, h = 1280, 720 
              fps = int(vp.get("fps", 30))
              dur = max(int(vp.get("duration", 30)), 5)
              script = str(vp.get("script_content", "")).strip()
              
              # 1. Voiceover
              vo = Path("vo.mp3")
              if len(script) > 5:
                  asyncio.run(gen_voice(script, vo))

              # 2. Assets
              assets = data.get("asset_urls") or []
              dl_tasks = []
              for i, a in enumerate(assets[:8]):
                  url = a.get("url") if isinstance(a, dict) else a
                  dl_tasks.append((i, url, Path(f"i_{i}")))
              
              with ThreadPoolExecutor(max_workers=4) as ex:
                  downloaded = [r for r in list(ex.map(dl_one, dl_tasks)) if r]

              # 3. Build FFmpeg Command
              inputs = []
              v_filters = []
              for i, f in enumerate(downloaded):
                  kind = detect_kind(f)
                  if kind == "image": inputs.extend(["-loop", "1"])
                  inputs.extend(["-t", "6", "-i", str(f)])
                  v_filters.append(f"[{i}:v]scale={w}:{h}:force_original_aspect_ratio=increase,crop={w}:{h},setsar=1,settb=AVTB[v{i}];")
              
              if not downloaded:
                  inputs.extend(["-f", "lavfi", "-i", f"color=c=black:s={w}x{h}:r={fps}"])
                  v_filters.append("[0:v]settb=AVTB[vfinal];")
                  v_map = "[vfinal]"
              else:
                  concat_str = "".join(f"[v{i}]" for i in range(len(downloaded)))
                  v_filters.append(f"{concat_str}concat=n={len(downloaded)}:v=1:a=0[vfinal];")
                  v_map = "[vfinal]"

              # Final Output setup
              out = Path("output.mp4")
              cmd = ["ffmpeg", "-y", "-hide_banner", "-loglevel", "error"] + inputs
              
              if vo.exists():
                  cmd.extend(["-i", "vo.mp3"])
                  a_map = f"{len(inputs)//2 if '-loop' in inputs else len(inputs)}:a"
              else:
                  cmd.extend(["-f", "lavfi", "-i", "anullsrc=r=44100:cl=stereo"])
                  a_map = f"{len(inputs)//2 if '-loop' in inputs else len(inputs)}:a"

              cmd.extend([
                  "-filter_complex", "".join(v_filters),
                  "-map", v_map, "-map", a_map,
                  "-t", str(dur), "-c:v", "libx264", "-preset", "ultrafast", "-crf", "30",
                  "-c:a", "aac", "-shortest", "-movflags", "+faststart", str(out)
              ])
              
              subprocess.run(cmd)
              Path("/tmp/output_path.txt").write_text(str(W / "output.mp4"))

          if __name__ == "__main__":
              main()
          PYEOF

      - name: Run render
        id: render
        run: |
          python3 /tmp/render.py
          OUTPUT=$(cat /tmp/output_path.txt)
          if [ -f "$OUTPUT" ]; then
            echo "output_path=$OUTPUT" >> "$GITHUB_OUTPUT"
          else
            echo "Error: Video not created"
            exit 1
          fi

      - name: Upload
        id: upload
        run: |
          RID="${{ steps.params.outputs.render_id }}"
          FILE="${{ steps.render.outputs.output_path }}"
          OBJ="github-${RID}.mp4"
          AUTH_H="Authorization: Bearer $SUPABASE_SERVICE_KEY"
          
          HTTP=$(curl -sS -w "%{http_code}" -o /tmp/up.txt \
            -X POST "$SUPABASE_URL/storage/v1/object/renders/$OBJ" \
            -H "$AUTH_H" -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: video/mp4" -H "x-upsert: true" \
            --data-binary @"$FILE")
            
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "video_url=$SUPABASE_URL/storage/v1/object/public/renders/$OBJ" >> "$GITHUB_OUTPUT"
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/up.txt
            exit 1
          fi

      - name: Callback
        if: always()
        run: |
          RID="${{ steps.params.outputs.render_id }}"
          URL="${{ steps.upload.outputs.video_url }}"
          OK="${{ steps.upload.outputs.ok }}"
          if [ "$OK" = "true" ]; then
            BODY=$(jq -nc --arg r "$RID" --arg u "$URL" '{action:"kaggle-callback",pending_render_id:$r,video_url:$u}')
          else
            BODY=$(jq -nc --arg r "$RID" '{action:"kaggle-callback",pending_render_id:$r,error:"failed"}')
          fi
          curl -sS -X POST "$SUPABASE_URL/functions/v1/kaggle-render" \
            -H "apikey: $SUPABASE_ANON_KEY" -H "Content-Type: application/json" \
            -d "$BODY" >/dev/null
