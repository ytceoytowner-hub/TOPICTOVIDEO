name: Render Video

on:
  repository_dispatch:
    types: [render-video]
  workflow_dispatch:
    inputs:
      pending_render_id:
        description: "Pending render ID"
        required: true
      callback_action:
        description: "Callback action name"
        required: false
        default: "kaggle-callback"

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve parameters
        id: params
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            RENDER_ID="${{ github.event.client_payload.pending_render_id }}"
            CALLBACK="${{ github.event.client_payload.callback_action }}"
          else
            RENDER_ID="${{ github.event.inputs.pending_render_id }}"
            CALLBACK="${{ github.event.inputs.callback_action }}"
          fi
          
          if [ -z "$CALLBACK" ]; then
            CALLBACK="kaggle-callback"
          fi
          
          echo "render_id=$RENDER_ID" >> "$GITHUB_OUTPUT"
          echo "callback=$CALLBACK" >> "$GITHUB_OUTPUT"

      - name: Validate secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Missing SUPABASE_URL"
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_ANON_KEY"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "Missing SUPABASE_SERVICE_KEY"
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg jq python3 python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install edge-tts

      - name: Mark render as rendering
        shell: bash
        continue-on-error: true
        run: |
          curl -sS -X PATCH \
            "$SUPABASE_URL/rest/v1/pending_renders?id=eq.${{ steps.params.outputs.render_id }}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"status":"rendering"}'

      - name: Fetch render data
        shell: bash
        run: |
          curl -sS \
            "$SUPABASE_URL/rest/v1/pending_renders?id=eq.${{ steps.params.outputs.render_id }}&select=*" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -o /tmp/render_data.json
          
          if [ ! -f /tmp/render_data.json ]; then
            echo "Failed to fetch render data"
            exit 1
          fi

      - name: Render video
        id: render
        shell: bash
        run: |
          mkdir -p /tmp/render_work
          cd /tmp/render_work
          cp /tmp/render_data.json ./render_data.json
          
          RESOLUTION=$(jq -r '.[0].video_params.resolution // "1920x1080"' render_data.json)
          FPS=$(jq -r '.[0].video_params.fps // 30' render_data.json)
          DURATION=$(jq -r '.[0].video_params.duration // 60' render_data.json)
          CAPTIONS=$(jq -r '.[0].video_params.captions // false' render_data.json)
          BG_MUSIC=$(jq -r '.[0].video_params.bg_music // "none"' render_data.json)
          
          WIDTH=$(echo "$RESOLUTION" | cut -d'x' -f1)
          HEIGHT=$(echo "$RESOLUTION" | cut -d'x' -f2)
          
          jq -r '.[0].video_params.script_content // ""' render_data.json > script_text.txt
          
          echo "Resolution: ${WIDTH}x${HEIGHT}"
          echo "FPS: $FPS"
          echo "Duration: $DURATION seconds"

      - name: Generate TTS voiceover
        shell: bash
        continue-on-error: true
        run: |
          cd /tmp/render_work
          
          cat > generate_tts.py << 'EOFPYTHON'

import asyncio
import edge_tts
from pathlib import Path

text = Path('script_text.txt').read_text(encoding='utf-8').strip()
if len(text) < 5:
    print("Text too short")
    exit(0)

text = text[:5000]

async def main():
    communicate = edge_tts.Communicate(text=text, voice='en-US-AriaNeural')
    await communicate.save('voiceover.mp3')

asyncio.run(main())
EOFPYTHON

          python3 generate_tts.py || echo "TTS failed"

      - name: Download assets
        shell: bash
        continue-on-error: true
        run: |
          cd /tmp/render_work
          
          ASSET_COUNT=$(jq 'if .[0].asset_urls == null then 0 else (.[0].asset_urls | length) end' render_data.json)
          
          if [ "$ASSET_COUNT" -gt 0 ]; then
            for i in $(seq 0 $((ASSET_COUNT - 1))); do
              URL=$(jq -r ".[0].asset_urls[$i].url // empty" render_data.json)
              if [ -n "$URL" ] && [ "$URL" != "null" ]; then
                curl -fsSL "$URL" -o "asset_$i.bin" || echo "Failed to download asset $i"
              fi
            done
          fi

      - name: Create base video
        shell: bash
        run: |
          cd /tmp/render_work
          
          RESOLUTION=$(jq -r '.[0].video_params.resolution // "1920x1080"' render_data.json)
          FPS=$(jq -r '.[0].video_params.fps // 30' render_data.json)
          DURATION=$(jq -r '.[0].video_params.duration // 60' render_data.json)
          
          WIDTH=$(echo "$RESOLUTION" | cut -d'x' -f1)
          HEIGHT=$(echo "$RESOLUTION" | cut -d'x' -f2)
          
          # Create simple black background video
          ffmpeg -y -hide_banner -loglevel error \
            -f lavfi -i "color=c=black:s=${WIDTH}:${HEIGHT}:d=${DURATION}" \
            -r "$FPS" \
            -c:v libx264 -preset fast -crf 23 \
            base_video.mp4
          
          if [ ! -f base_video.mp4 ]; then
            echo "Failed to create base video"
            exit 1
          fi

      - name: Create audio track
        shell: bash
        run: |
          cd /tmp/render_work
          
          DURATION=$(jq -r '.[0].video_params.duration // 60' render_data.json)
          
          if [ -f voiceover.mp3 ]; then
            ffmpeg -y -hide_banner -loglevel error \
              -i voiceover.mp3 \
              -t "$DURATION" \
              -c:a aac -b:a 192k \
              final_audio.m4a
          else
            ffmpeg -y -hide_banner -loglevel error \
              -f lavfi -i "anullsrc=r=44100:cl=stereo" \
              -t "$DURATION" \
              -c:a aac -b:a 128k \
              final_audio.m4a
          fi
          
          if [ ! -f final_audio.m4a ]; then
            echo "Failed to create audio"
            exit 1
          fi

      - name: Mux video and audio
        shell: bash
        run: |
          cd /tmp/render_work
          
          ffmpeg -y -hide_banner -loglevel error \
            -i base_video.mp4 \
            -i final_audio.m4a \
            -map 0:v:0 \
            -map 1:a:0 \
            -c:v copy \
            -c:a aac \
            -shortest \
            -movflags +faststart \
            output.mp4
          
          if [ ! -f output.mp4 ]; then
            echo "Failed to create output video"
            exit 1
          fi
          
          ls -lh output.mp4
          echo "output_path=/tmp/render_work/output.mp4" >> "$GITHUB_OUTPUT"

      - name: Upload to Supabase
        id: upload
        shell: bash
        run: |
          RENDER_ID="${{ steps.params.outputs.render_id }}"
          FILE_NAME="renders/github-${RENDER_ID}.mp4"
          
          HTTP_CODE=$(curl -sS -w "%{http_code}" -o /tmp/upload_resp.txt \
            -X POST "$SUPABASE_URL/storage/v1/object/renders/$FILE_NAME" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: video/mp4" \
            -H "x-upsert: true" \
            --data-binary @"${{ steps.render.outputs.output_path }}")
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            VIDEO_URL="$SUPABASE_URL/storage/v1/object/public/renders/$FILE_NAME"
            echo "video_url=$VIDEO_URL" >> "$GITHUB_OUTPUT"
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send callback
        if: always()
        shell: bash
        continue-on-error: true
        run: |
          RENDER_ID="${{ steps.params.outputs.render_id }}"
          CALLBACK="${{ steps.params.outputs.callback }}"
          VIDEO_URL="${{ steps.upload.outputs.video_url }}"
          SUCCESS="${{ steps.upload.outputs.success }}"
          
          if [ "$SUCCESS" = "true" ] && [ -n "$VIDEO_URL" ]; then
            PAYLOAD="{\"action\":\"$CALLBACK\",\"pending_render_id\":\"$RENDER_ID\",\"video_url\":\"$VIDEO_URL\"}"
          else
            PAYLOAD="{\"action\":\"$CALLBACK\",\"pending_render_id\":\"$RENDER_ID\",\"error\":\"Render failed\"}"
          fi
          
          curl -sS -X POST "$SUPABASE_URL/functions/v1/kaggle-render" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
