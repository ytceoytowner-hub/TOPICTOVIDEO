name: Render Video

on:
  repository_dispatch:
    types: [render-video]
  workflow_dispatch:
    inputs:
      pending_render_id:
        description: "Pending render ID"
        required: true
      callback_action:
        description: "Callback action name"
        required: false
        default: "kaggle-callback"

permissions:
  contents: read

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Resolve parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "render_id=${{ github.event.client_payload.pending_render_id }}" >> "$GITHUB_OUTPUT"
            CB="${{ github.event.client_payload.callback_action }}"
          else
            echo "render_id=${{ github.event.inputs.pending_render_id }}" >> "$GITHUB_OUTPUT"
            CB="${{ github.event.inputs.callback_action }}"
          fi
          echo "callback=${CB:-kaggle-callback}" >> "$GITHUB_OUTPUT"

      - name: Validate
        run: |
          test -n "${{ steps.params.outputs.render_id }}" || { echo "Missing render_id"; exit 1; }
          test -n "$SUPABASE_URL" || { echo "Missing SUPABASE_URL"; exit 1; }
          test -n "$SUPABASE_ANON_KEY" || { echo "Missing SUPABASE_ANON_KEY"; exit 1; }
          test -n "$SUPABASE_SERVICE_KEY" || { echo "Missing SUPABASE_SERVICE_KEY"; exit 1; }

      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg jq
          python3 -m pip install --break-system-packages edge-tts 2>/dev/null || pip install edge-tts

      - name: Mark rendering and fetch job
        run: |
          RID="${{ steps.params.outputs.render_id }}"
          echo "Render ID: $RID"
          
          curl -v -X PATCH "$SUPABASE_URL/rest/v1/pending_renders?id=eq.$RID" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status":"rendering","error_message":null}'

          curl -v "$SUPABASE_URL/rest/v1/pending_renders?id=eq.$RID&select=*" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -o /tmp/render_data.json

          test "$(jq 'length' /tmp/render_data.json 2>/dev/null)" -gt 0 || { echo "Error: No render found. Check ID and Keys."; exit 1; }

      - name: Write render script
        run: |
          cat > /tmp/render_raw.py << 'PYEOF'
          import asyncio, json, os, re, subprocess
          from concurrent.futures import ThreadPoolExecutor
          from pathlib import Path
          import edge_tts

          THREADS = "4"

          def run(cmd):
              return subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)

          def ffmpeg(cmd):
              return run(cmd).returncode == 0

          def detect_kind(p):
              pr = run(["ffprobe","-v","error","-show_entries","stream=codec_type","-of","json",str(p)])
              try:
                  for s in json.loads(pr.stdout or "{}").get("streams",[]):
                      if s.get("codec_type") == "video":
                          return "video"
              except Exception:
                  pass
              return "image" if p.suffix.lower() in {".jpg",".jpeg",".png",".webp",".bmp"} else "unknown"

          def dl_one(args):
              i, url = args
              out = Path(f"asset_{i}.bin")
              run(["curl","-fsSL","--retry","2","--connect-timeout","10","-o",str(out),str(url)])
              return out if out.exists() and out.stat().st_size > 0 else None

          async def gen_voice(text, out):
              hindi = bool(re.search(r'[\u0900-\u097F]', text))
              v = "hi-IN-SwaraNeural" if hindi else "en-US-AndrewMultilingualNeural"
              c = edge_tts.Communicate(text=text[:5000], voice=v, rate="+4%", pitch="+2Hz")
              await c.save(str(out))

          def main():
              W = Path("/tmp/rw")
              W.mkdir(parents=True, exist_ok=True)
              os.chdir(W)
              data = json.loads(Path("/tmp/render_data.json").read_text())[0]
              vp = data.get("video_params") or {}
              
              res = str(vp.get("resolution", "1080x1920"))
              w, h = (int(x) for x in (res.split("x",1) if "x" in res else ["1080","1920"]))
              fps = int(vp.get("fps", 30))
              dur = max(int(vp.get("duration", 60)), 5)
              bg = str(vp.get("bg_music", "none") or "none")
              script = str(vp.get("script_content", "") or "").strip()

              vo = W / "vo.mp3"
              if len(script) > 5:
                  try:
                      asyncio.run(gen_voice(script, vo))
                  except Exception:
                      pass

              assets = data.get("asset_urls") or []
              dl_tasks = []
              for i, a in enumerate(assets):
                  url = a.get("url") if isinstance(a, dict) else a
                  typ = (a.get("type") if isinstance(a, dict) else "video") or "video"
                  if not url:
                      continue
                  if typ == "voiceover" and not vo.exists():
                      run(["curl","-fsSL","--retry","2","-o",str(vo),str(url)])
                  else:
                      dl_tasks.append((i, url))

              downloaded = []
              if dl_tasks:
                  with ThreadPoolExecutor(max_workers=4) as ex:
                      downloaded = [r for r in ex.map(dl_one, dl_tasks) if r]

              VF = f"scale={w}:{h}:force_original_aspect_ratio=decrease,pad={w}:{h}:(ow-iw)/2:(oh-ih)/2,format=yuv420p"
              ENC = ["-c:v","libx264","-preset","ultrafast","-crf","26","-threads",THREADS,"-an"]
              seg = max(3, min(6, dur // 8 if dur > 0 else 4))
              clips = []
              for i, f in enumerate(downloaded):
                  kind = detect_kind(f)
                  out = Path(f"c_{i:03d}.mp4")
                  if kind == "video":
                      ok = ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-stream_loop","-1","-i",str(f),"-t",str(seg),"-vf",VF,"-r",str(fps)] + ENC + [str(out)])
                  elif kind == "image":
                      ok = ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-loop","1","-i",str(f),"-t",str(seg),"-vf",VF,"-r",str(fps)] + ENC + [str(out)])
                  else:
                      ok = False
                  if ok and out.exists() and out.stat().st_size > 0:
                      clips.append(out)

              base = Path("base.mp4")
              if clips:
                  Path("concat.txt").write_text("\n".join(f"file '{c.name}'" for c in clips))
                  ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-f","concat","-safe","0","-i","concat.txt","-t",str(dur),"-vf",f"fps={fps},format=yuv420p"] + ENC[:-1] + [str(base)])
              if not (base.exists() and base.stat().st_size > 0):
                  ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-f","lavfi","-i",f"color=c=black:s={w}x{h}:r={fps}","-t",str(dur)] + ENC + [str(base)])

              bgm = Path("bgm.mp3")
              if bg == "lofi":
                  ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-f","lavfi","-i",f"anoisesrc=d={dur}:c=pink:r=44100:a=0.02","-af","lowpass=f=3000,bass=g=5","-t",str(dur),"-c:a","libmp3lame","-b:a","128k",str(bgm)])
              elif bg == "cinematic":
                  ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-f","lavfi","-i",f"sine=f=220:d={dur}","-f","lavfi","-i",f"sine=f=330:d={dur}","-filter_complex","[0:a][1:a]amix=inputs=2:duration=longest,volume=0.05,aecho=0.8:0.88:60:0.4","-t",str(dur),"-c:a","libmp3lame","-b:a","128k",str(bgm)])
              elif bg not in ("none", ""):
                  ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-f","lavfi","-i",f"anoisesrc=d={dur}:c=white:r=44100:a=0.015","-af","highpass=f=500","-t",str(dur),"-c:a","libmp3lame","-b:a","128k",str(bgm)])

              audio = Path("audio.m4a")
              if vo.exists() and bgm.exists():
                  ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-i",str(vo),"-i",str(bgm),"-filter_complex","[0:a]volume=1.0[v];[1:a]volume=0.14[b];[v][b]amix=inputs=2:duration=longest[a]","-map","[a]","-t",str(dur),"-c:a","aac","-b:a","192k",str(audio)])
              elif vo.exists():
                  ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-i",str(vo),"-t",str(dur),"-c:a","aac","-b:a","192k",str(audio)])
              elif bgm.exists():
                  ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-i",str(bgm),"-t",str(dur),"-c:a","aac","-b:a","192k",str(audio)])
              else:
                  ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-f","lavfi","-i","anullsrc=r=44100:cl=stereo","-t",str(dur),"-c:a","aac","-b:a","128k",str(audio)])

              out = Path("output.mp4")
              ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-i",str(base),"-i",str(audio),"-map","0:v","-map","1:a","-c:v","copy","-c:a","aac","-shortest","-movflags","+faststart",str(out)])

              if not (out.exists() and out.stat().st_size > 0):
                  ffmpeg(["ffmpeg","-y","-hide_banner","-loglevel","error","-f","lavfi","-i",f"color=c=black:s={w}x{h}:r={fps}","-f","lavfi","-i","anullsrc=r=44100:cl=stereo","-t",str(dur),"-c:v","libx264","-preset","ultrafast","-crf","26","-c:a","aac","-shortest","-movflags","+faststart",str(out)])

              Path("/tmp/output_path.txt").write_text(str(out))

          if __name__ == "__main__":
              try:
                  main()
              except Exception:
                  Path("/tmp/rw").mkdir(parents=True, exist_ok=True)
                  run(["ffmpeg","-y","-f","lavfi","-i","color=c=black:s=1080x1920:r=30","-f","lavfi","-i","anullsrc=r=44100:cl=stereo","-t","10","-c:v","libx264","-preset","ultrafast","-crf","26","-c:a","aac","-shortest","-movflags","+faststart","/tmp/rw/output.mp4"])
                  Path("/tmp/output_path.txt").write_text("/tmp/rw/output.mp4")
          PYEOF
          python3 -c "import textwrap; open('/tmp/render.py', 'w').write(textwrap.dedent(open('/tmp/render_raw.py').read()))"

      - name: Run render
        id: render
        run: |
          python3 /tmp/render.py
          OUTPUT=$(cat /tmp/output_path.txt)
          test -f "$OUTPUT" || { echo "No output"; exit 1; }
          echo "output_path=$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Upload
        id: upload
        run: |
          RID="${{ steps.params.outputs.render_id }}"
          FILE="${{ steps.render.outputs.output_path }}"
          OBJ="github-${RID}.mp4"
          ATTEMPT=1
          OK=false
          while [ "$ATTEMPT" -le 3 ]; do
            HTTP=$(curl -sS -w "%{http_code}" -o /tmp/up.txt \
              -X POST "$SUPABASE_URL/storage/v1/object/renders/$OBJ" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: video/mp4" \
              -H "x-upsert: true" \
              --data-binary @"$FILE")
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
              OK=true
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            sleep 2
          done
          if [ "$OK" = true ]; then
            echo "video_url=$SUPABASE_URL/storage/v1/object/public/renders/$OBJ" >> "$GITHUB_OUTPUT"
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Callback
        if: always()
        run: |
          RID="${{ steps.params.outputs.render_id }}"
          CB="${{ steps.params.outputs.callback }}"
          URL="${{ steps.upload.outputs.video_url }}"
          OK="${{ steps.upload.outputs.ok }}"
          if [ "$OK" = "true" ] && [ -n "$URL" ]; then
            BODY=$(jq -nc --arg a "$CB" --arg r "$RID" --arg u "$URL" '{action:$a,pending_render_id:$r,video_url:$u}')
          else
            BODY=$(jq -nc --arg a "$CB" --arg r "$RID" --arg e "render failed" '{action:$a,pending_render_id:$r,error:$e}')
          fi
          curl -sS -X POST "$SUPABASE_URL/functions/v1/kaggle-render" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" >/dev/null || true
